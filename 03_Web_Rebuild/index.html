<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>光锥之外：纪元往事</title>
    <meta name="description" content="基于《三体》世界观改编的4X策略游戏" />
    <meta name="theme-color" content="#0B1020" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="光锥之外" />
    <meta name="application-name" content="光锥之外" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="icons/icon-192x192.png" />
    <link rel="apple-touch-startup-image" href="icons/icon-512x512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  </head>
  <body>
    <div id="app">
      <!-- 启动封面：在 React 应用加载完成前显示，PWA 启动时避免黑屏/白屏 -->
      <div
        id="splash-screen"
        style="
          position: fixed;
          inset: 0;
          z-index: 9999;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #0B1020;
        "
      >
        <img
          src="icons/icon-512x512.png"
          alt="光锥之外：纪元往事"
          style="
            width: 56vmin;
            height: 56vmin;
            max-width: 512px;
            max-height: 512px;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(0, 150, 255, 0.15);
          "
        />
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
