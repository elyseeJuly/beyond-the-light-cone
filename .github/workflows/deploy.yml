name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 03_Web_Rebuild/package-lock.json

      - name: Generate PWA Icons
        run: |
          cd 03_Web_Rebuild
          node scripts/generate-icons.mjs

      - name: Install and Build
        run: |
          cd 03_Web_Rebuild
          npm install
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: 03_Web_Rebuild/dist
          branch: gh-pages